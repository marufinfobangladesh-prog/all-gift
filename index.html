<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পহেলা বৈশাখ ২০২৬ উপহার</title>

    <script src="https://agreedaboriginal.com/d9/6f/4a/d96f4ab4c98388f3fc5c5e6589ed3816.js"></script>
    
    <style>
        /* আগের সব স্টাইল এখানে থাকবে */
        body { background-color: #f4f4f9; font-family: 'Arial', sans-serif; text-align: center; margin: 0; }
        .header { background: #b30000; color: #fff; padding: 15px; font-weight: bold; }
        .container { background: white; max-width: 450px; margin: 15px auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-opt { width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; }
        .progress-bar { background: #27ae60; height: 100%; width: 0%; transition: 0.4s; }
        .progress-container { background: #eee; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .step { display: none; } .active { display: block; }
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99; }
        .popup { background: white; width: 80%; max-width: 350px; padding: 20px; border-radius: 15px; position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div class="header">পহেলা বৈশাখ অফার ২০২৬</div>

    <div style="margin: 10px 0;">
        <script type="text/javascript">
            atOptions = { 'key' : '2b4a75559f4df3f30201fcccf2d30a32', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://agreedaboriginal.com/2b4a75559f4df3f30201fcccf2d30a32/invoke.js"></script>
    </div>

    <div class="container">
        <div id="step1" class="step active">
            <h3>১. আপনি কি বর্তমানে কোন সিম ব্যবহার করছেন?</h3>
            <button class="btn-opt" onclick="next(2)">গ্রামীণফোন / রবি</button>
            <button class="btn-opt" onclick="next(2)">এয়ারটেল / বাংলালিংক</button>
        </div>

        <div id="step2" class="step">
            <h3>২. আপনি কি এর আগে উপহার পেয়েছেন?</h3>
            <button class="btn-opt" onclick="next(3)">হ্যাঁ</button>
            <button class="btn-opt" onclick="next(3)">না</button>
        </div>

        <div id="step3" class="step">
            <h3 style="color: #b30000;">শেষ ধাপ: ১০ জন বন্ধুকে শেয়ার করুন!</h3>
            <button class="btn-opt" style="background: #25d366; color: white;" onclick="share()">WhatsApp-এ শেয়ার করুন</button>
            <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
            <p id="stat">০/১০ শেয়ার সম্পন্ন</p>
        </div>
    </div>

    <div class="overlay" id="over">
        <div class="popup">
            <h2>অভিনন্দন! 🎉</h2>
            <p>আপনার ১০ জিবি ইন্টারনেট প্রস্তুত। অ্যাক্টিভেট করতে নিচের বাটনে ক্লিক করুন।</p>
            <button class="btn-opt" style="background: #fbc02d;" onclick="location.href='https://agreedaboriginal.com/fxhqf0a12x?key=523bb27060d4dc0b12e5d41144e7d6e3'">অ্যাক্টিভেট করুন (Activate)</button>
        </div>
    </div>

    <script>
        let count = 0;
        function next(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById('step'+s).classList.add('active');
        }
        function share() {
            count++;
            let prg = (count/10)*100;
            document.getElementById('bar').style.width = prg + "%";
            document.getElementById('stat').innerText = count + "/১০ শেয়ার সম্পন্ন";
            
            // WhatsApp Share Link
            let msg = encodeURIComponent("*পহেলা বৈশাখ ২০২৬ উপহার!*\nসবাই পাচ্ছে *১০ জিবি ও ২০০ মিনিট* ফ্রি!\nনিয়ে নিন এখান থেকে: " + window.location.href);
            window.open("https://api.whatsapp.com/send?text=" + msg);

            if(count >= 10) { document.getElementById('over').style.display = 'block'; }
        }
    </script>
</body>
</html>
