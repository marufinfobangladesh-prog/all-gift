            <button class="sim-btn gp" onclick="openAd(); next(2)">Grameenphone</button>

            <button class="sim-btn airtel" onclick="openAd(); next(2)">Airtel</button>
            <button class="sim-btn tele" onclick="openAd(); next(2)">Teletalk</button>
        </div>

        <div id="step2" class="step">
            <h3 style="color: #b30000;">১০ জন বন্ধুকে শেয়ার করলে অফার পাবেন!</h3>
            <button class="sim-btn" style="background:#607d8b;" onclick="copyLink()">🔗 লিঙ্ক কপি করুন</button>
            <button class="sim-btn" style="background:#25d366;" onclick="openAd(); share('wp')">WhatsApp শেয়ার</button>
            <button class="sim-btn" style="background:#0084ff;" onclick="openAd(); share('ms')">Messenger শেয়ার</button>

            <div class="progress-bar-bg"><div class="progress-fill" id="bar"></div></div>
            <p id="st" style="font-weight:bold;">০/১০ রেফার সম্পন্ন</p>

    <div class="overlay" id="ov">
        <div class="popup">
            <h2 style="color:#27ae60;">অভিনন্দন! 🎉</h2>
            <p>নিচের বাটনে ক্লিক করে অফারটি অ্যাক্টিভেট করুন।</p>
            <button class="btn-claim" onclick="location.href='https://agreedaboriginal.com/ehednak21?key=d4b4be80d3bc0464336ea47c30182ca9'">অ্যাক্টিভেট করুন</button>
        </div>
    </div>

    <script>
        let myUID = localStorage.getItem('v_uid') || Math.random().toString(36).substring(7);
        localStorage.setItem('v_uid', myUID);
        const myReferLink = window.location.origin + window.location.pathname + "?ref=" + myUID;

        // আপনার দেওয়া সব ডিরেক্ট লিঙ্কগুলোর লিস্ট
        const ads = [
            "https://agreedaboriginal.com/ifd6qsabm?key=4f332073a80ac65355477a47cf26a6dc",
            "https://agreedaboriginal.com/dmw8j7hvri?key=36faca42ce43663e21e0fcb5f4198d62",
            "https://agreedaboriginal.com/fxhqf0a12x?key=523bb27060d4dc0b12e5d41144e7d6e3",
            "https://agreedaboriginal.com/z8ugy829?key=23488864c034010e7c01d9a1f1c5ff42",
            "https://agreedaboriginal.com/ehednak21?key=d4b4be80d3bc0464336ea47c30182ca9"
        ];

        // বাটন ক্লিক করলে একেকবার একেকটা ডিরেক্ট লিঙ্ক খুলবে
        function openAd() {
            let randomAd = ads[Math.floor(Math.random() * ads.length)];
            window.open(randomAd, '_blank');
        }

        const fullMessage = `শুভ নববর্ষ ১৪৩৩\nবৈশাখী উপহার ২০২৬!\n🎁 ১০ জিবি ইন্টারনেট ও ২০০ মিনিট ফ্রি!\nএখনি নিন: ${myReferLink}`;

        function next(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById('step'+s).classList.add('active');
        }

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = fullMessage;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("লিঙ্ক কপি হয়েছে!");
        }

        function share(platform) {
            let url = (platform === 'wp') ? "https://api.whatsapp.com/send?text=" + encodeURIComponent(fullMessage) : "fb-messenger://share/?link=" + encodeURIComponent(myReferLink);
            window.open(url, '_blank');
        }
    </script>
